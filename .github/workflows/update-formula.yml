name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula
        env:
          VERSION: ${{ github.event.client_payload.version }}
          DARWIN_AMD64_SHA: ${{ github.event.client_payload.darwin_amd64_sha }}
          DARWIN_ARM64_SHA: ${{ github.event.client_payload.darwin_arm64_sha }}
          LINUX_AMD64_SHA: ${{ github.event.client_payload.linux_amd64_sha }}
          LINUX_ARM64_SHA: ${{ github.event.client_payload.linux_arm64_sha }}
        run: |
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/squix.rb
          sed -i "s|https://github.com/eduardofuncao/squix/releases/download/v.*squix-darwin-amd64|https://github.com/eduardofuncao/squix/releases/download/v${VERSION}/squix-darwin-amd64|" Formula/squix.rb
          sed -i "s|https://github.com/eduardofuncao/squix/releases/download/v.*squix-darwin-arm64|https://github.com/eduardofuncao/squix/releases/download/v${VERSION}/squix-darwin-arm64|" Formula/squix.rb
          sed -i "s|https://github.com/eduardofuncao/squix/releases/download/v.*squix-linux-amd64|https://github.com/eduardofuncao/squix/releases/download/v${VERSION}/squix-linux-amd64|" Formula/squix.rb
          sed -i "s|https://github.com/eduardofuncao/squix/releases/download/v.*squix-linux-arm64|https://github.com/eduardofuncao/squix/releases/download/v${VERSION}/squix-linux-arm64|" Formula/squix.rb

          # Update darwin amd64 sha256
          awk -v sha="$DARWIN_AMD64_SHA" '
            /squix-darwin-amd64"/ { found=1 }
            found && /sha256/ { sub(/sha256 "[^"]*"/, "sha256 \"" sha "\""); found=0 }
            { print }
          ' Formula/squix.rb > tmp && mv tmp Formula/squix.rb

          # Update darwin arm64 sha256
          awk -v sha="$DARWIN_ARM64_SHA" '
            /squix-darwin-arm64"/ { found=1 }
            found && /sha256/ { sub(/sha256 "[^"]*"/, "sha256 \"" sha "\""); found=0 }
            { print }
          ' Formula/squix.rb > tmp && mv tmp Formula/squix.rb

          # Update linux amd64 sha256
          awk -v sha="$LINUX_AMD64_SHA" '
            /squix-linux-amd64"/ { found=1 }
            found && /sha256/ { sub(/sha256 "[^"]*"/, "sha256 \"" sha "\""); found=0 }
            { print }
          ' Formula/squix.rb > tmp && mv tmp Formula/squix.rb

          # Update linux arm64 sha256
          awk -v sha="$LINUX_ARM64_SHA" '
            /squix-linux-arm64"/ { found=1 }
            found && /sha256/ { sub(/sha256 "[^"]*"/, "sha256 \"" sha "\""); found=0 }
            { print }
          ' Formula/squix.rb > tmp && mv tmp Formula/squix.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/squix.rb
          git diff --cached --quiet || git commit -m "bump formula to ${{ github.event.client_payload.version }}"
          git push
